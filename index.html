<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정성밥상 | Homemade Korean Food</title>

<style>

body {
    margin: 0;
    font-family: 'Arial', sans-serif;
}

/* HERO SECTION */
.hero {
    background: url('https://images.unsplash.com/photo-1498654896293-37aacf113fd9') no-repeat center;
    background-size: cover;
    height: 100vh;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.hero-content {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    text-align: center;
    border-radius: 10px;
}

.hero h1 {
    font-size: 50px;
    margin: 0;
}

.hero p {
    font-size: 18px;
    margin: 10px 0 20px;
}

.btn {
    background: #ff4d4d;
    color: white;
    padding: 12px 25px;
    text-decoration: none;
    border-radius: 5px;
}

/* MENU */
.menu {
    padding: 50px;
    text-align: center;
    background: #f9f9f9;
}

.menu h2 {
    margin-bottom: 30px;
}

.menu-items {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.item {
    width: 250px;
    background: white;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.item img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 10px;
}

/* ABOUT */
.about {
    padding: 40px;
    text-align: center;
}

/* FOOTER */
footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 20px;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>정성밥상</h1>
        <p>Homemade Hygienic Korean Food</p>
        <a href="#" class="btn">Order Now</a>
    </div>
</div>

<!-- MENU -->
<div class="menu">
    <h2>Our Menu</h2>

    <div class="menu-items">

        <div class="item">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/74/Kimchi.jpg">
            <h3>Kimchi</h3>
            <p>Fresh homemade kimchi</p>
            <p><strong>₩8,000</strong></p>
        </div>

        <div class="item">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Gimbap.jpg">
            <h3>Kimbap</h3>
            <p>Healthy handmade kimbap</p>
            <p><strong>₩4,500</strong></p>
        </div>

    </div>
</div>

<!-- ABOUT -->
<div class="about">
    <h2>Why Choose Us?</h2>
    <p>✔ 100% Homemade<br>
       ✔ Clean & Hygienic Cooking<br>
       ✔ Fresh Ingredients Daily</p>
</div>

<!-- FOOTER -->
<footer>
    <p>📞 010-1234-5678</p>
    <p>📍 Seoul, Korea</p>
</footer>

</body>
</html>
